{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="form-box">
    <h2>HR Login</h2>

    {% if error %}
      <p style="color: #ff6b6b; text-align:center;">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="link-text">
      <p>Don’t have an account? <a href="{{ url_for('hr_signup') }}">Sign up</a></p>
    </div>
  </div>
</div>

{% endblock %}
