{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="glass form-box">
    <h2>Student Login</h2>
    <form method="POST">
      <input type="email" name="email" placeholder="Email">
      <input type="password" name="password" placeholder="Password">
      <button>Login</button>
    </form>
    <p class="link-text">
      Don’t have an account?
      <a href="{{ url_for('student_signup') }}">Sign up here</a>
    </p>
  </div>
</div>
{% endblock %}
